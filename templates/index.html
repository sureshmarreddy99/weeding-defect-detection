<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weeding Defect Detection</title>
</head>
<body>
    <h1>Weeding Defect Detection</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit">Upload and Analyze</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    {% if input_image_url %}
        <h2>Input Image</h2>
        <img src="{{ input_image_url }}" width="500">
    {% endif %}

    {% if output_image_url %}
        <h2>Output Image</h2>
        <img src="{{ output_image_url }}" width="500">
    {% endif %}

    {% if result %}
        <h2>Analysis Summary</h2>
        <p><strong>Defect Count:</strong> {{ result.defect_count }}</p>
        <p><strong>Defects:</strong> {{ result.defects }}</p>
    {% endif %}
</body>
</html>
